<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Redefinir Senha — VulnexusAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="/js/toast.js"></script>
  <style>
    :root{
      --void:#030712;--base:#060d1f;--surface:#0a1128;--elevated:#0f1733;
      --green:#00e676;--green-d:rgba(0,230,118,.12);--green-glow:0 0 40px rgba(0,230,118,.25);
      --red:#ff4466;--border:rgba(255,255,255,0.07);--border-2:rgba(255,255,255,0.12);
      --text:#f0f4ff;--text-2:#8899bb;--text-3:#3d4f6a;
      --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
      --r8:8px;--r12:12px;--r16:16px;--r24:24px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:var(--font);
      background: radial-gradient(ellipse at top, #0d1f3c 0%, #030712 60%);
      color:var(--text); min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:24px; -webkit-font-smoothing:antialiased;
    }
    .card{
      background:var(--surface);border:1px solid var(--border-2);
      border-radius:var(--r24);padding:40px;width:100%;max-width:420px;
      animation:fadeup .35s cubic-bezier(.16,1,.3,1);
    }
    @keyframes fadeup{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .header{text-align:center;margin-bottom:28px}
    .logo{font-size:2rem;margin-bottom:8px}
    .title{font-size:1.35rem;font-weight:800;letter-spacing:-.03em;margin-bottom:6px}
    .title span{color:var(--green)}
    .sub{font-family:var(--mono);font-size:.75rem;color:var(--text-2);line-height:1.6}
    .field{margin-bottom:16px}
    label{display:block;font-family:var(--mono);font-size:.65rem;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
    input{
      width:100%;background:var(--elevated);border:1px solid var(--border);
      border-radius:var(--r12);padding:13px 15px;font-family:var(--mono);
      font-size:.85rem;color:var(--text);outline:none;transition:all .2s;caret-color:var(--green);
    }
    input::placeholder{color:var(--text-3)}
    input:focus{border-color:rgba(0,230,118,.35);box-shadow:0 0 0 3px rgba(0,230,118,.07)}
    .btn-submit{
      width:100%;background:var(--green);color:#020a05;border:none;
      border-radius:var(--r12);padding:14px;font-family:var(--font);
      font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px;
    }
    .btn-submit:hover{background:#1dff90;box-shadow:var(--green-glow)}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed}
    .spinner{width:15px;height:15px;border:2px solid rgba(2,10,5,.3);border-top-color:#020a05;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .back-link{text-align:center;margin-top:20px;font-family:var(--mono);font-size:.75rem;color:var(--text-3)}
    .back-link a{color:var(--green);text-decoration:none;font-weight:600}
    .back-link a:hover{text-decoration:underline}
    .divider{height:1px;background:var(--border);margin:18px 0}
    .success-state{text-align:center;display:none}
    .success-state .ic{font-size:3rem;margin-bottom:12px}
    .success-state h2{font-size:1.1rem;font-weight:700;margin-bottom:8px;color:var(--green)}
    .success-state p{font-family:var(--mono);font-size:.75rem;color:var(--text-2);line-height:1.6}
  </style>
</head>
<body>
  <div class="card">
    <div id="formState">
      <div class="header">
        <div class="logo">🔑</div>
        <div class="title">Redefinir <span>Senha</span></div>
        <div class="sub">Informe seu email e enviaremos um link para redefinir sua senha.</div>
      </div>

      <div class="field">
        <label for="emailInput">Email</label>
        <input type="email" id="emailInput" placeholder="seu@email.com" autofocus>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="solicitarReset()">
        Enviar link de redefinição
      </button>

      <div class="divider"></div>
      <div class="back-link">
        Lembrou a senha? <a href="/dashboard.html">Fazer login</a>
      </div>
    </div>

    <div class="success-state" id="successState">
      <div class="ic">📬</div>
      <h2>Email enviado!</h2>
      <p>Se este email estiver cadastrado, você receberá as instruções de redefinição em instantes.<br><br>Verifique também sua caixa de spam.</p>
      <div class="divider"></div>
      <div class="back-link"><a href="/dashboard.html">← Voltar ao login</a></div>
    </div>
  </div>

  <script>
  const API = "";

  async function solicitarReset() {
    const email = document.getElementById('emailInput').value.trim();
    const btn = document.getElementById('submitBtn');

    if (!email) { showToast('Informe seu email.', 'warning'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast('Email inválido.', 'error'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Enviando...';

    try {
      const r = await fetch(`${API}/api/auth/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      // Sempre mostrar sucesso (segurança: não revelar se email existe)
      document.getElementById('formState').style.display = 'none';
      document.getElementById('successState').style.display = 'block';
    } catch (e) {
      // Mesmo em erro de rede, mostrar confirmação por segurança
      document.getElementById('formState').style.display = 'none';
      document.getElementById('successState').style.display = 'block';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') solicitarReset();
  });
  </script>
</body>
</html>
